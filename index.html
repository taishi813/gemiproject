<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアル顔射シミュレーター</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        .container {
            position: relative;
            box-shadow: 0 0 40px rgba(255, 80, 120, 0.3);
        }
        #target-image {
            display: block;
            max-width: 100%;
            height: auto;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        .controls {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.9);
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            color: #fff;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 520px;
        }
        button {
            padding: 10px 18px;
            background: linear-gradient(#ff3366, #cc1133);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { transform: scale(1.05); }
        input[type="file"] {
            display: none;
        }
        .upload-label {
            padding: 10px 18px;
            background: #444;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }
        .info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="target-image" src="/home/workdir/attachments/image.jpeg" alt="ターゲット画像">
        <canvas id="canvas"></canvas>
        
        <div class="info">画像をアップロード → ドラッグでぶっかけられます</div>
        
        <div class="controls">
            <label class="upload-label">
                📸 画像をアップロード
                <input type="file" id="image-upload" accept="image/*">
            </label>
            <button onclick="heavyCumBurst()">💦 強力射精</button>
            <button onclick="clearCanvas()">🗑️ クリア</button>
            <button onclick="toggleAuto()">⏬ 自動垂れ</button>
            
            <div style="display:flex;align-items:center;gap:8px;">
                <span>太さ</span>
                <input type="range" id="amount" min="8" max="50" value="24" style="width:120px;">
            </div>
        </div>
    </div>

    <script>
        const img = document.getElementById('target-image');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const uploadInput = document.getElementById('image-upload');

        let particles = [];
        let drips = [];
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let autoDrip = false;

        // Particle & Drip クラス（前回と同じ高品質版）
        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.life = 100 + Math.random() * 70;
                this.size = 7 + Math.random() * 16;
            }
            update() {
                this.vy += 0.22;
                this.vx *= 0.96;
                this.vy *= 0.97;
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.size *= 0.982;
            }
            draw() {
                const a = this.life / 140;
                ctx.save();
                ctx.globalAlpha = a * 0.95;
                ctx.fillStyle = "#fff8f0";
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#fff";
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size, this.size*0.65, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Drip {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.length = 20 + Math.random() * 50;
                this.speed = 1.2 + Math.random() * 2;
                this.width = 5 + Math.random() * 12;
                this.life = 320;
            }
            update() {
                this.y += this.speed;
                this.speed += 0.04;
                this.life--;
            }
            draw() {
                const a = this.life / 350;
                ctx.save();
                ctx.globalAlpha = a * 0.9;
                ctx.strokeStyle = "#fff8f0";
                ctx.lineWidth = this.width;
                ctx.lineCap = "round";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#fff";
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(this.x-8, this.y+this.length*0.5, this.x+5, this.y+this.length);
                ctx.stroke();
                ctx.restore();
            }
        }

        function resizeCanvas() {
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
        }

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // アップロード処理
        uploadInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                loadImage(e.target.files[0]);
            }
        });

        img.onload = () => {
            resizeCanvas();
        };

        // 描画関数
        function drawFluid(x, y, prevX, prevY, intensity) {
            ctx.save();
            ctx.globalAlpha = 0.93;
            ctx.strokeStyle = "#fff8f0";
            ctx.lineWidth = intensity;
            ctx.lineCap = "round";
            ctx.shadowBlur = 25;
            ctx.shadowColor = "#fff7e0";
            
            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.quadraticCurveTo(
                (prevX + x) / 2 + (Math.random() - 0.5) * 12,
                (prevY + y) / 2 + (Math.random() - 0.5) * 12,
                x, y
            );
            ctx.stroke();
            ctx.restore();
        }

        function addSplat(x, y, force = 1) {
            for (let i = 0; i < 22 * force; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 8 * force;
                particles.push(new Particle(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 3
                ));
            }
            for (let i = 0; i < 8 * force; i++) {
                drips.push(new Drip(x + (Math.random()-0.5)*120, y + (Math.random()-0.5)*80));
            }
        }

        // マウス・タッチイベント（省略せず全部記載）
        canvas.addEventListener('mousedown', e => { isDrawing = true; updateLastPos(e); });
        canvas.addEventListener('mousemove', e => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            drawFluid(x, y, lastX, lastY, document.getElementById('amount').value / 2);
            if (Math.random() > 0.45) addSplat(x, y, 0.7);
            
            lastX = x; lastY = y;
        });
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        function updateLastPos(e) {
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        }

        // タッチ対応も同様
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; updateLastPos(e.touches[0]); });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            drawFluid(x, y, lastX, lastY, 14);
            if (Math.random() > 0.4) addSplat(x, y, 0.8);
            lastX = x; lastY = y;
        });
        canvas.addEventListener('touchend', () => isDrawing = false);

        function animate() {
            ctx.save();
            ctx.globalCompositeOperation = "source-atop";
            
            for (let i = particles.length-1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            for (let i = drips.length-1; i >= 0; i--) {
                drips[i].update();
                drips[i].draw();
                if (drips[i].life <= 0) drips.splice(i, 1);
            }
            ctx.restore();
            requestAnimationFrame(animate);
        }

        function heavyCumBurst() {
            const cx = canvas.width * 0.5;
            const cy = canvas.height * 0.43;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => addSplat(cx + (Math.random()-0.5)*100, cy + (Math.random()-0.5)*70, 2.4), i * 80);
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
            drips = [];
        }

        function toggleAuto() {
            autoDrip = !autoDrip;
        }

        // 自動垂れ
        setInterval(() => {
            if (autoDrip && drips.length < 15) {
                const x = canvas.width * (0.25 + Math.random() * 0.55);
                drips.push(new Drip(x, canvas.height * 0.32));
            }
        }, 160);

        window.onload = () => {
            resizeCanvas();
            animate();
            setTimeout(heavyCumBurst, 700);
        };

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
