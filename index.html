<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paint Splash</title>

<style>
html, body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:sans-serif;
    touch-action:none;
}

#container{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

#uploadedImage{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

#paintCanvas{
    position:absolute;
    width:100%;
    height:100%;
    left:0;
    top:0;
}

#ui{
    position:absolute;
    z-index:10;
    top:15px;
    left:15px;
}

input[type=file]{
    background:rgba(255,255,255,0.8);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="container">

    <img id="uploadedImage">

    <canvas id="paintCanvas"></canvas>

    <div id="ui">
        <input type="file" id="imageInput" accept="image/*">
    </div>

</div>

<script>
const imageInput = document.getElementById('imageInput');
const uploadedImage = document.getElementById('uploadedImage');

const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');

let w,h;

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

imageInput.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = ev=>{
        uploadedImage.src = ev.target.result;
    };

    reader.readAsDataURL(file);
});

class Splash{

    constructor(x,y){

        this.x = x;
        this.y = h + 100;

        const angle = (-Math.PI/2) + ((Math.random()-0.5)*0.5);

        const speed = 15 + Math.random()*10;

        this.vx = Math.cos(angle)*speed;
        this.vy = Math.sin(angle)*speed;

        this.radius = 10 + Math.random()*35;

        this.alpha = 0.65;

        this.gravity = 0.25;

        this.life = 120;

        this.stretch = 1 + Math.random()*1.5;
    }

    update(){

        this.vy += this.gravity;

        this.x += this.vx;
        this.y += this.vy;

        this.life--;

        if(this.life < 40){
            this.alpha -= 0.015;
        }
    }

    draw(){

        ctx.save();

        ctx.translate(this.x,this.y);

        ctx.rotate(Math.atan2(this.vy,this.vx)+Math.PI/2);

        ctx.scale(1,this.stretch);

        ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;

        ctx.beginPath();
        ctx.arc(0,0,this.radius,0,Math.PI*2);
        ctx.fill();

        ctx.restore();

        // 垂れ
        if(Math.random()<0.4){

            ctx.strokeStyle = `rgba(255,255,255,${this.alpha*0.7})`;
            ctx.lineWidth = this.radius*0.3;

            ctx.beginPath();
            ctx.moveTo(this.x,this.y);

            ctx.lineTo(
                this.x + (Math.random()-0.5)*20,
                this.y + 20 + Math.random()*60
            );

            ctx.stroke();
        }
    }
}

const splashes = [];

function shoot(x){

    const amount = 8 + Math.random()*12;

    for(let i=0;i<amount;i++){

        splashes.push(
            new Splash(
                x + (Math.random()-0.5)*80,
                h
            )
        );
    }

    // 大きい飛沫
    for(let i=0;i<4;i++){

        const s = new Splash(
            x + (Math.random()-0.5)*40,
            h
        );

        s.radius *= 1.8;
        s.vy *= 1.2;

        splashes.push(s);
    }
}

function animate(){

    ctx.clearRect(0,0,w,h);

    for(let i=splashes.length-1;i>=0;i--){

        const s = splashes[i];

        s.update();
        s.draw();

        if(s.alpha <= 0 || s.life <= 0){
            splashes.splice(i,1);
        }
    }

    requestAnimationFrame(animate);
}

animate();

function pointer(e){

    let x;

    if(e.touches){
        x = e.touches[0].clientX;
    }else{
        x = e.clientX;
    }

    shoot(x);
}

window.addEventListener('click',pointer);
window.addEventListener('touchstart',pointer);

</script>

</body>
</html>
