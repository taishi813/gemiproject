<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>グラドルAIチャット（Gemini版）</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  background: #ffffff;
  color: #222;
}

.sidebar {
  width: 220px;
  background: #f5f5f5;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  line-height: 1.5;
  white-space: pre-wrap;
}

.user {
  background: #4f46e5;
  color: white;
  margin-left: auto;
}

.ai {
  background: #e5e7eb;
  color: #111;
}

.controls {
  padding: 10px;
  border-top: 1px solid #ddd;
  background: #fafafa;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  padding: 10px 15px;
  margin-left: 5px;
  cursor: pointer;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 5px;
}

button:hover {
  background: #4338ca;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>キャラ</h3>
  <select id="character">
    <option value="aizawa">相澤仁美</option>
    <option value="tejima">手島優</option>
    <option value="matsugane">松金洋子</option>
    <option value="wacchi">わちみなみ</option>
    <option value="rangiku">松本乱菊</option>
  </select>
</div>

<div class="main">
  <div id="chat" class="chat"></div>

  <div class="controls">
    <div class="input-area">
      <input id="input" placeholder="メッセージを入力">
      <button id="sendBtn">送信</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

let history = [];

const characterPrompts = {
  aizawa: "あなたは強気で挑発的な女性キャラとして会話してください。",
  tejima: "あなたは少し控えめで優しい女性キャラとして会話してください。",
  matsugane: "あなたは大人の余裕ある女性キャラとして会話してください。",
  wacchi: "あなたは元気で積極的な後輩キャラとして会話してください。",
  rangiku: "あなたは余裕ある妖艶なお姉さんキャラとして会話してください。"
};

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  const charKey = document.getElementById("character").value;
  const characterPrompt = characterPrompts[charKey];

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });

  try {
    const res = await fetch("/api/gemini", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        systemPrompt: characterPrompt,
        history
      })
    });

    const data = await res.json();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    addMessage("通信エラー: " + e.message, "ai");
  }
}

sendBtn.addEventListener("click", send);

// Enterキーでも送信
document.getElementById("input").addEventListener("keydown", (e) => {
  // Enterキーかつ、変換中じゃないときだけ送信
  if (e.key === "Enter" && !e.isComposing) {
    e.preventDefault(); // ←これ重要（勝手な送信防止）
    send();
  }
});
</script>

</body>
</html>
