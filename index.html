<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアル顔射シミュレーター</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        .container {
            position: relative;
            box-shadow: 0 0 40px rgba(255, 80, 120, 0.3);
        }
        #target-image {
            display: block;
            max-width: 100%;
            height: auto;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        .controls {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.85);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            gap: 12px;
            align-items: center;
            color: #fff;
            backdrop-filter: blur(10px);
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(#ff3366, #cc1133);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 50, 80, 0.4);
        }
        button:hover { transform: scale(1.05); }
        .slider {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            pointer-events: none;
            text-shadow: 0 1px 3px #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="target-image" src="/home/workdir/attachments/image.jpeg" alt="target">
        <canvas id="canvas"></canvas>
        
        <div class="info">ドラッグでリアルにぶっかけてください</div>
        
        <div class="controls">
            <button onclick="heavyCumBurst()">強力射精</button>
            <button onclick="clearCanvas()">クリア</button>
            <div class="slider">
                <span>量</span>
                <input type="range" id="amount" min="5" max="45" value="22">
            </div>
            <button onclick="toggleAuto()">自動垂れ</button>
        </div>
    </div>

    <script>
        const img = document.getElementById('target-image');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        let particles = [];
        let drips = [];
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let autoDrip = false;

        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.life = 90 + Math.random() * 60;
                this.size = 6 + Math.random() * 18;
                this.gravity = 0.18;
                this.friction = 0.96;
            }
            update() {
                this.vy += this.gravity;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.size *= 0.985;
            }
            draw() {
                const alpha = this.life / 120;
                ctx.save();
                ctx.globalAlpha = alpha * 0.95;
                ctx.fillStyle = `rgba(255, 248, 240, ${alpha})`;
                ctx.shadowBlur = 18;
                ctx.shadowColor = "#fff7e6";
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size, this.size * 0.65, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Drip {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.length = 15 + Math.random() * 45;
                this.speed = 0.8 + Math.random() * 1.6;
                this.width = 4 + Math.random() * 11;
                this.life = 280;
            }
            update() {
                this.y += this.speed;
                this.speed += 0.035;
                this.life--;
            }
            draw() {
                const alpha = this.life / 300;
                ctx.save();
                ctx.globalAlpha = alpha * 0.9;
                ctx.strokeStyle = "#fff8f0";
                ctx.lineWidth = this.width;
                ctx.lineCap = "round";
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#fff";
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(this.x - 6, this.y + this.length * 0.6, this.x + 4, this.y + this.length);
                ctx.stroke();
                ctx.restore();
            }
        }

        function resizeCanvas() {
            canvas.width = img.offsetWidth;
            canvas.height = img.offsetHeight;
        }

        img.onload = () => {
            resizeCanvas();
        };

        function drawFluid(x, y, prevX, prevY, intensity) {
            const dx = x - prevX;
            const dy = y - prevY;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            
            ctx.save();
            ctx.globalAlpha = 0.92;
            ctx.strokeStyle = "#fff8f0";
            ctx.lineWidth = intensity;
            ctx.lineCap = "round";
            ctx.shadowBlur = 22;
            ctx.shadowColor = "#fff7e6";
            
            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.quadraticCurveTo(
                (prevX + x)/2 + (Math.random()-0.5)*8, 
                (prevY + y)/2 + (Math.random()-0.5)*8, 
                x, y
            );
            ctx.stroke();
            
            // 光沢
            ctx.globalAlpha = 0.4;
            ctx.lineWidth = intensity * 0.45;
            ctx.strokeStyle = "rgba(255,255,255,0.95)";
            ctx.stroke();
            
            ctx.restore();
        }

        function addSplat(x, y, force = 1) {
            for (let i = 0; i < 18 * force; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 7 * force;
                particles.push(new Particle(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 2
                ));
            }
            
            // 太い飛沫
            for (let i = 0; i < 6 * force; i++) {
                const px = x + (Math.random() - 0.5) * 90;
                const py = y + (Math.random() - 0.5) * 70;
                drips.push(new Drip(px, py));
            }
        }

        // マウス描画
        canvas.addEventListener('mousedown', e => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousemove', e => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const intensity = parseFloat(document.getElementById('amount').value) / 2;
            drawFluid(x, y, lastX, lastY, intensity);
            
            if (Math.random() > 0.4) {
                addSplat(x, y, 0.6);
            }
            
            lastX = x;
            lastY = y;
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        // タッチ対応
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
            isDrawing = true;
        });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            drawFluid(x, y, lastX, lastY, 12);
            if (Math.random() > 0.35) addSplat(x, y, 0.7);
            
            lastX = x; lastY = y;
        });

        canvas.addEventListener('touchend', () => isDrawing = false);

        function animate() {
            ctx.save();
            ctx.globalCompositeOperation = "source-atop";
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0 || particles[i].size < 1) {
                    particles.splice(i, 1);
                }
            }
            
            for (let i = drips.length - 1; i >= 0; i--) {
                drips[i].update();
                drips[i].draw();
                if (drips[i].life <= 0) drips.splice(i, 1);
            }
            
            ctx.restore();
            requestAnimationFrame(animate);
        }

        function heavyCumBurst() {
            const centerX = canvas.width * 0.48;
            const centerY = canvas.height * 0.42;
            
            // 強力連射
            for (let burst = 0; burst < 4; burst++) {
                setTimeout(() => {
                    addSplat(centerX + (Math.random()-0.5)*80, centerY + (Math.random()-0.5)*60, 2.2);
                    
                    // 太い射線
                    ctx.save();
                    ctx.globalAlpha = 0.75;
                    ctx.strokeStyle = "#fff8f0";
                    ctx.lineWidth = 38;
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = "#fff";
                    ctx.beginPath();
                    ctx.moveTo(centerX - 40, centerY - 30);
                    ctx.quadraticCurveTo(centerX + 30, centerY + 80, centerX + (Math.random()-0.5)*120, centerY + 140);
                    ctx.stroke();
                    ctx.restore();
                }, burst * 90);
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
            drips = [];
        }

        function toggleAuto() {
            autoDrip = !autoDrip;
            if (autoDrip) {
                setInterval(() => {
                    if (autoDrip && drips.length < 12) {
                        const x = canvas.width * (0.3 + Math.random() * 0.5);
                        drips.push(new Drip(x, canvas.height * 0.35));
                    }
                }, 180);
            }
        }

        window.onload = () => {
            resizeCanvas();
            animate();
            
            // 初回デモ
            setTimeout(() => heavyCumBurst(), 600);
        };

        window.addEventListener('resize', () => {
            if (img.complete) resizeCanvas();
        });
    </script>
</body>
</html>
