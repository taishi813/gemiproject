<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>グラドルAIチャット（Gemini版）</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
  background: #ffffff;
}

.sidebar {
  width: 220px;
  background: #f5f5f5;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  line-height: 1.5;
  white-space: pre-wrap;
}

.user {
  background: #4f46e5;
  color: white;
  margin-left: auto;
}

.ai {
  background: #e5e7eb;
  color: #111;
}

/* ローディングアニメーション */
.loading {
  background: #e5e7eb;
  color: #666;
  font-style: italic;
}

.dots::after {
  content: "";
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}

.controls {
  padding: 10px;
  border-top: 1px solid #ddd;
  background: #fafafa;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  padding: 10px 15px;
  margin-left: 5px;
  cursor: pointer;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>キャラ</h3>
  <select id="character">
    <option value="aizawa">強気キャラ</option>
    <option value="tejima">優しいキャラ</option>
    <option value="matsugane">大人キャラ</option>
    <option value="wacchi">元気キャラ</option>
    <option value="rangiku">妖艶キャラ</option>
  </select>
</div>

<div class="main">
  <div id="chat" class="chat"></div>

  <div class="controls">
    <div class="input-area">
      <input id="input" placeholder="メッセージを入力">
      <button id="sendBtn">送信</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

let history = [];

const characterPrompts = {
  aizawa: "強気で挑発的に話す女性",
  tejima: "優しくて少し控えめな女性",
  matsugane: "余裕ある大人の女性",
  wacchi: "元気で積極的な女性",
  rangiku: "妖艶で余裕のある女性"
};

function addMessage(text, type, isLoading = false) {
  const div = document.createElement("div");
  div.className = "message " + type;
  if (isLoading) div.classList.add("loading");
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  const charKey = document.getElementById("character").value;
  const characterPrompt = characterPrompts[charKey];

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });

  // ローディング表示
  const loadingMsg = addMessage("考え中", "ai", true);
  loadingMsg.classList.add("dots");

  try {
    const res = await fetch("/api/gemini", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        systemPrompt: characterPrompt,
        history
      })
    });

    const data = await res.json();

    loadingMsg.remove();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    loadingMsg.remove();
    addMessage("通信エラー: " + e.message, "ai");
  }
}

sendBtn.addEventListener("click", send);

// Enterキー誤爆防止
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
